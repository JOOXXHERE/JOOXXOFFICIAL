<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | JOOXX</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        .checkout-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            overflow: hidden;
            padding: 60px;
        }

        .checkout-details h1 {
            font-size: 48px;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .checkout-details p {
            color: var(--text-muted);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .service-list {
            margin-bottom: 40px;
        }

        .service-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .service-item i {
            color: var(--primary);
        }

        .test-drive {
            display: inline-block;
            margin-top: 20px;
            color: var(--primary);
            text-decoration: underline;
            font-weight: 600;
        }

        .payment-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .qr-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .qr-card img {
            width: 250px;
            height: 250px;
            display: block;
        }

        .price-tag {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .price-tag span {
            font-size: 18px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .payment-note {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 20px;
        }

        .back-link {
            position: absolute;
            top: 40px;
            left: 40px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 850px) {
            .checkout-container {
                grid-template-columns: 1fr;
                padding: 40px 20px;
            }
            .checkout-page {
                padding: 120px 20px 60px 20px;
            }
        }
    </style>
</head>
<body class="dark-theme">
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>

    <main class="checkout-page">
        <div class="checkout-container reveal active" style="text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px;">
            <div class="construction-icon" style="font-size: 60px; color: var(--primary); margin-bottom: 30px; opacity: 0.8;">
                <i class="fas fa-compass-drafting"></i>
            </div>
            <h1 style="font-size: 8vw; margin-bottom: 20px;">Coming <span>Soon</span></h1>
            <p style="font-size: 20px; color: var(--text-muted); max-width: 500px; margin: 0 auto 40px auto;">
                The JOOXX Hire Portal is currently undergoing a architectural redesign. We're building something that will redefine how we collaborate.
            </p>
            
            <div class="status-badge" style="background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--glass-border); font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px;">
                Status: Under Construction
            </div>

            <a href="index.html" class="btn-clean">Return to Portfolio</a>
        </div>
    </main>

    <script>
        const form = document.getElementById('registration-form');
        const successMessage = document.getElementById('success-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            
            // Show success message immediately as requested
            form.style.display = 'none';
            successMessage.style.display = 'block';

            // Send to Formspree in background
            try {
                await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
            } catch (err) {
                console.error("Form submission failed, but user saw success message.");
            }
        });
    </script>

    <script src="main.js"></script>
</body>
</html>
